<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة إدارة الحجوزات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-body: #07070d;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-card: rgba(212, 175, 55, 0.15);
            --text-primary: #f0ece3;
            --text-secondary: #a8a3a0;
            --accent-gold: #d4af37;
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.6);
            --radius-md: 16px;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            padding: 30px 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-card);
            padding-bottom: 20px;
        }
        .header h1 {
            color: var(--accent-gold);
            font-size: 2rem;
        }
        .header a {
            color: var(--text-secondary);
            text-decoration: none;
            border: 1px solid var(--border-card);
            padding: 8px 20px;
            border-radius: 50px;
            transition: 0.3s;
        }
        .header a:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-md);
            padding: 40px 30px;
            text-align: center;
            box-shadow: var(--shadow-card);
        }
        .login-box input {
            width: 100%;
            padding: 14px 18px;
            margin: 15px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-card);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
        }
        .login-box input:focus {
            border-color: var(--accent-gold);
            outline: none;
        }
        .login-box button {
            background: var(--accent-gold);
            color: #07070d;
            border: none;
            padding: 12px 40px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .login-box button:hover { opacity: 0.8; transform: scale(1.02); }
        .login-box .error { color: #c84e6b; margin-top: 10px; display: block; }
        
        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-md);
            padding: 15px 25px;
            flex: 1;
            min-width: 150px;
            text-align: center;
        }
        .stat-card span { color: var(--accent-gold); font-size: 2rem; font-weight: 800; display: block; }
        .stat-card label { color: var(--text-secondary); font-size: 0.9rem; }

        .actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .actions button {
            background: rgba(212, 175, 55, 0.12);
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }
        .actions button:hover { background: var(--accent-gold); color: #07070d; }
        .actions .btn-danger { border-color: #c84e6b; color: #c84e6b; }
        .actions .btn-danger:hover { background: #c84e6b; color: #fff; }

        .table-wrap {
            overflow-x: auto;
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-md);
            padding: 15px;
            box-shadow: var(--shadow-card);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }
        th {
            color: var(--accent-gold);
            padding: 15px 10px;
            border-bottom: 2px solid var(--border-card);
            font-size: 0.95rem;
        }
        td {
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: var(--text-secondary);
        }
        td .delete-btn {
            background: none;
            border: none;
            color: #c84e6b;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        td .delete-btn:hover { transform: scale(1.2); }
        .empty-msg {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        @media (max-width: 600px) {
            .header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container" id="appContainer">
        <!-- سيتم عرض إما صفحة الدخول أو المحتوى عبر JavaScript -->
    </div>

    <script>
        // =========================================================
        // ====== إعدادات الأمان (غيّر كلمة المرور هنا) ======
        // =========================================================
        const ADMIN_PASSWORD = 'admin123'; // <-- غيّرها إلى ما تريده

        // =========================================================
        // ====== دوال إدارة الحجوزات ======
        // =========================================================
        function getBookings() {
            return JSON.parse(localStorage.getItem('bookings')) || [];
        }

        function saveBookings(bookings) {
            localStorage.setItem('bookings', JSON.stringify(bookings));
        }

        function deleteBooking(id) {
            if (!confirm('هل أنت متأكد من حذف هذا الحجز؟')) return;
            let bookings = getBookings();
            bookings = bookings.filter(b => b.id !== id);
            saveBookings(bookings);
            renderAdmin();
        }

        function clearAll() {
            if (!confirm('⚠️ هل أنت متأكد من مسح جميع الحجوزات؟ هذا الإجراء لا يمكن التراجع عنه!')) return;
            saveBookings([]);
            renderAdmin();
        }

        function exportCSV() {
            const bookings = getBookings();
            if (bookings.length === 0) {
                alert('لا توجد حجوزات لتصديرها.');
                return;
            }
            let csv = "الاسم,رقم الهاتف,البرنامج,التاريخ,الحالة\n";
            bookings.forEach(b => {
                csv += `"${b.name}","${b.phone}","${b.program}","${b.date}","${b.status}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `حجوزات_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }

        // =========================================================
        // ====== عرض لوحة التحكم ======
        // =========================================================
        function renderAdmin() {
            const container = document.getElementById('appContainer');
            const bookings = getBookings();

            let html = `
                <div class="header">
                    <h1><i class="fas fa-user-cog"></i> لوحة إدارة الحجوزات</h1>
                    <div>
                        <a href="index.html"><i class="fas fa-home"></i> العودة للرئيسية</a>
                        <a href="#" onclick="logout()" style="margin-right:10px; border-color:#c84e6b; color:#c84e6b;">
                            <i class="fas fa-sign-out-alt"></i> خروج
                        </a>
                    </div>
                </div>
                
                <div class="stats">
                    <div class="stat-card"><span>${bookings.length}</span><label>إجمالي الحجوزات</label></div>
                </div>

                <div class="actions">
                    <button onclick="exportCSV()"><i class="fas fa-file-export"></i> تصدير CSV</button>
                    <button class="btn-danger" onclick="clearAll()"><i class="fas fa-trash-alt"></i> مسح الكل</button>
                </div>

                <div class="table-wrap">
            `;

            if (bookings.length === 0) {
                html += `<div class="empty-msg"><i class="fas fa-inbox" style="font-size:3rem;color:var(--border-card);"></i><p>لا توجد حجوزات حتى الآن</p></div>`;
            } else {
                html += `
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>اسم العميل</th>
                                <th>رقم الهاتف</th>
                                <th>البرنامج</th>
                                <th>تاريخ الحجز</th>
                                <th>الحالة</th>
                                <th>إجراء</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                bookings.forEach((b, index) => {
                    html += `
                        <tr>
                            <td>${index + 1}</td>
                            <td><strong style="color:#fff;">${b.name}</strong></td>
                            <td dir="ltr">${b.phone}</td>
                            <td>${b.program}</td>
                            <td>${b.date || 'غير محدد'}</td>
                            <td><span style="color:#25d366;">${b.status || 'جديد'}</span></td>
                            <td>
                                <button class="delete-btn" onclick="deleteBooking(${b.id})" title="حذف">
                                    <i class="fas fa-times-circle"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
                html += `</tbody></table>`;
            }

            html += `</div>`;
            container.innerHTML = html;
        }

        // =========================================================
        // ====== تسجيل الدخول / الخروج ======
        // =========================================================
        function login() {
            const pass = document.getElementById('passwordInput').value;
            if (pass === ADMIN_PASSWORD) {
                sessionStorage.setItem('admin_logged_in', 'true');
                renderAdmin();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function logout() {
            sessionStorage.removeItem('admin_logged_in');
            showLogin();
        }

        function showLogin() {
            const container = document.getElementById('appContainer');
            container.innerHTML = `
                <div class="login-box">
                    <h2 style="color:var(--accent-gold); margin-bottom:10px;">🔐 دخول المشرف</h2>
                    <p style="color:var(--text-secondary); margin-bottom:20px;">أدخل كلمة المرور للوصول إلى لوحة التحكم</p>
                    <input type="password" id="passwordInput" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter') login()" />
                    <button onclick="login()">دخول</button>
                    <span class="error" id="loginError" style="display:none;">❌ كلمة المرور غير صحيحة</span>
                </div>
            `;
        }

        // =========================================================
        // ====== تهيئة الصفحة ======
        // =========================================================
        (function init() {
            // التحقق من حالة تسجيل الدخول
            if (sessionStorage.getItem('admin_logged_in') === 'true') {
                renderAdmin();
            } else {
                showLogin();
            }
        })();
    </script>
</body>
</html>
